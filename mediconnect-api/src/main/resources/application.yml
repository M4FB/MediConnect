server:
  port: 8080

spring:
  application:
    name: mediconnect-api

  datasource:
    url: jdbc:h2:mem:mediconnect_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: ${JWT_SECRET:mediconnect-dev-secret-key-change-in-production-min-256-bits-long}
    access-expiration: 3600000
    refresh-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.mediconnect.api: DEBUG
    org.springframework.security: DEBUG
