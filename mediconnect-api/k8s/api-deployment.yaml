apiVersion: apps/v1
kind: Deployment
metadata:
  name: mediconnect-api
  namespace: 2023800251
  labels:
    app: mediconnect-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mediconnect-api
  template:
    metadata:
      labels:
        app: mediconnect-api
    spec:
      containers:
        - name: mediconnect-api
          image: mediconnect-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-configmap
            - secretRef:
                name: api-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
